<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Accede a tu primera clase mientras creamos tu acceso al programa completo">
<title>¡Espera! Tu Acceso Está Siendo Creado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #fff;
    overflow-x: hidden;
  }

  .alert-bar {
    background: #e82020;
    color: #fff;
    text-align: center;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.3px;
    line-height: 1.5;
    text-transform: uppercase;
  }

  .hero {
    text-align: center;
    padding: 36px 20px 20px;
    max-width: 720px;
    margin: 0 auto;
  }

  .hero h1 {
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 900;
    color: #0d0d0d;
    line-height: 1.2;
  }

  .hero h1 span {
    color: #f5c400;
    display: block;
  }

  .arrow {
    font-size: 40px;
    margin: 12px 0 20px;
    display: block;
    animation: bounce 1s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  .video-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  .video-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; /* 16:9 aspect ratio */
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .video-container > div {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .video-fallback {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    text-align: center;
    font-size: 16px;
    padding: 20px;
    display: none;
  }

  .video-container.loading .video-fallback {
    display: block;
  }

  @media (max-width: 480px) {
    .alert-bar {
      font-size: 13px;
      padding: 12px 16px;
    }

    .hero {
      padding: 24px 16px 16px;
    }

    .video-wrap {
      padding: 0 16px 32px;
    }

    .video-fallback {
      font-size: 14px;
      padding: 16px;
    }
  }
</style>
</head>
<body>

<div class="alert-bar" role="alert" aria-live="polite">
  ⚠️ NO SALGAS DE ESTA PÁGINA — ESTAMOS CREANDO TU ACCESO.<br>
  CERRARLA AHORA PODRÍA GENERAR ERRORES EN TU PEDIDO.
</div>

<div class="hero">
  <h1>¡Mira abajo tu<span>PRIMERA CLASE!</span></h1>
  <span class="arrow" aria-hidden="true">👇</span>
</div>

<div class="video-wrap">
  <div class="video-container loading">
    <div id="vid-69af03346e1bd68075b2c661" aria-label="Video de presentación del programa"></div>
    <div class="video-fallback" aria-hidden="true">
      ⏳ Cargando video...<br>
      <small>Si el video no carga, por favor actualiza la página</small>
    </div>
  </div>
  <script>
    // Remove loading class when video loads
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.querySelector('.video-container').classList.remove('loading');
      }, 2000);
    });
  </script>
  <script src="https://scripts.converteai.net/60c57e38-903d-4b8c-afdb-955793042b17/players/69af03346e1bd68075b2c661/v4/player.js" type="text/javascript" async></script>
</div>

</body>
</html>
